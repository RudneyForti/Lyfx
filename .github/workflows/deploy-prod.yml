name: Deploy to production (4000)

# Deploy-on-tag: production advances only when a version tag is pushed —
# it keeps the human release gate (tagging is a human decision) while
# automating the rebuild + restart + migrate that used to be manual.
#
# Runs on a self-hosted runner registered on the machine that hosts the
# production worktree (label: lyfx-prod). Because the runner IS that
# machine, the job targets the existing production worktree directly and
# reuses its gitignored .env — no secrets ever leave the machine or enter
# GitHub.
#
# Steps use `shell: powershell` (Windows PowerShell 5.1, always present on
# the runner). `shell: bash` was NOT usable: on a Windows runner it resolves
# to System32\bash.exe (the WSL launcher), which fails when no WSL distro is
# installed.

on:
  push:
    tags:
      - "v*"

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, lyfx-prod]
    # This job operates on the existing production worktree — it does NOT
    # check the repo out into the runner workspace.
    steps:
      - name: Deploy the tagged release
        shell: powershell
        env:
          # Absolute path to the production worktree on the runner machine.
          # Adjust here if the runner ever moves to a different host/path.
          PROD_DIR: 'C:\Users\rudne\projetos\lyfx-production'
          TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Deploying $env:TAG to production worktree at $env:PROD_DIR"
          Set-Location $env:PROD_DIR

          # Fetch the new tag and check out its exact commit (detached).
          # Under deploy-on-tag, production tracks the latest release tag,
          # not main-HEAD — so what runs is exactly what was released.
          git fetch origin --tags --prune
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          git checkout --force "tags/$env:TAG"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          Write-Host "Checked out $(git describe --tags --always)"

          # Rebuild the image with the released source, then recreate the
          # containers. The `migrate` service runs prisma db push before the
          # app comes up (compose depends_on), so schema changes apply here.
          docker compose --env-file .env build
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          docker compose --env-file .env up -d
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

          docker compose --env-file .env ps

      - name: Report deployed version
        if: always()
        shell: powershell
        env:
          PROD_DIR: 'C:\Users\rudne\projetos\lyfx-production'
        run: |
          Set-Location $env:PROD_DIR
          Write-Host "Production now at: $(git describe --tags --always)"
