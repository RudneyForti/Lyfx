# Lyfx — Desenvolvimento (develop / porta 3000)
# Uso: docker compose -f docker-compose.dev.yml up
# Nota: no Windows, volume bind mounts são lentos. Preferir npm run dev nativo para desenvolvimento ativo.

services:
  lyfx-dev:
    image: node:22-alpine
    container_name: lyfx-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app                  # bind mount — código local refletido no container
      - /app/node_modules       # volume anônimo — preserva node_modules do container
      - /app/.next              # volume anônimo — preserva cache de build
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npm run dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
